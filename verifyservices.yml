---
- name: Verificación de Servicios Críticos en Linux
  hosts: all
  become: yes  # Necesario para gestionar servicios (systemd)

  vars:
    # Lista de servicios que queremos monitorear
    servicios_a_validar:
      - sshd
      - httpd  # Cambia a 'apache2' si usas Ubuntu/Debian

  tasks:
    - name: Comprobar el estado de los servicios
      ansible.builtin.service_facts:

    - name: Reportar estado de servicios encontrados
      ansible.builtin.debug:
        msg: "El servicio {{ item }} está {{ ansible_facts.services[item + '.service'].state | default('NO INSTALADO') }}"
      loop: "{{ servicios_a_validar }}"

    - name: Asegurar que los servicios críticos estén encendidos (Auto-healing)
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop: "{{ servicios_a_validar }}"
      register: service_result
      # Esto marcará como "changed" solo si el servicio estaba apagado y tuvo que encenderse
