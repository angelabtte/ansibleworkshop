---
- name: Gestión y Monitoreo de Servidores Windows
  hosts: all
  gather_facts: yes
  
  vars:
    new_username: ansible
    new_user_password: "P@ssw0rd2026!"
    new_user_fullname: "Ansible Automation User"
    new_user_description: "Usuario creado por Ansible para automatización"
    report_dir: C:\Temp
    report_file: services_report.json

  tasks:

    # ===== FIX CRÍTICO (TU ERROR) =====
    - name: Asegurar que existe C:\Temp
      ansible.windows.win_file:
        path: "{{ report_dir }}"
        state: directory

    # ===== CPU =====
    - name: Obtener información del procesador
      ansible.windows.win_shell: |
        Get-CimInstance Win32_Processor | 
        Select-Object Name, NumberOfCores, NumberOfLogicalProcessors, MaxClockSpeed
      register: cpu_info
      changed_when: false

    - name: Obtener uso actual de CPU
      ansible.windows.win_shell: |
        $cpu = Get-Counter '\Processor(_Total)\% Processor Time' -SampleInterval 1 -MaxSamples 5
        $avgCPU = ($cpu.CounterSamples | Measure-Object CookedValue -Average).Average
        [PSCustomObject]@{
            CPU_Promedio = [math]::Round($avgCPU, 2)
            Timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        } | ConvertTo-Json
      register: cpu_usage
      changed_when: false

    - name: Obtener procesos con mayor consumo de CPU
      ansible.windows.win_shell: |
        Get-Process | Sort-Object CPU -Descending |
        Select-Object -First 10 Name, CPU, Id |
        ConvertTo-Json
      register: top_cpu_processes
      changed_when: false

    # ===== SERVICIOS =====
    - name: Obtener servicios
      ansible.windows.win_service_info:
      register: all_services

    - name: Clasificar servicios
      set_fact:
        running_services: "{{ all_services.services | selectattr('state', 'equalto', 'running') | list }}"
        stopped_services: "{{ all_services.services | selectattr('state', 'equalto', 'stopped') | selectattr('start_mode', 'equalto', 'auto') | list }}"

    - name: Verificar servicios críticos
      ansible.windows.win_service_info:
        name: "{{ item }}"
      loop:
        - W32Time
        - Winmgmt
        - WinRM
        - EventLog
        - Dhcp
        - Dnscache
        - LanmanServer
        - LanmanWorkstation
      register: critical_services
      ignore_errors: yes

    # ===== EXPORTACIÓN (CORREGIDA) =====
    - name: Exportar servicios a JSON (forma correcta)
      ansible.windows.win_copy:
        content: "{{ all_services.services | to_nice_json }}"
        dest: "{{ report_dir }}\\{{ report_file }}"

    # ===== USUARIO =====
    - name: Crear o actualizar usuario ansible
      ansible.windows.win_user:
        name: "{{ new_username }}"
        password: "{{ new_user_password }}"
        fullname: "{{ new_user_fullname }}"
        description: "{{ new_user_description }}"
        state: present
        password_never_expires: yes
        groups:
          - Administrators
        groups_action: add

    - name: Agregar a Remote Desktop Users
      ansible.windows.win_group_membership:
        name: "Remote Desktop Users"
        members:
          - "{{ new_username }}"
        state: present

    # ===== VERIFICACIÓN USUARIO =====
    - name: Verificar usuario
      ansible.windows.win_shell: |
        $user = Get-LocalUser -Name "{{ new_username }}"
        [PSCustomObject]@{
            Usuario = $user.Name
            Habilitado = $user.Enabled
        } | ConvertTo-Json
      register: user_verification
      changed_when: false

    # ===== INFO SISTEMA =====
    - name: Obtener info sistema
      ansible.windows.win_shell: |
        [PSCustomObject]@{
            Hostname = $env:COMPUTERNAME
            SO = (Get-CimInstance Win32_OperatingSystem).Caption
            MemoriaGB = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 2)
        } | ConvertTo-Json
      register: system_info
      changed_when: false

    # ===== REPORTE FINAL =====
    - name: Reporte final
      debug:
        msg:
          - "===== REPORTE ====="
          - "Sistema: {{ (system_info.stdout | from_json) }}"
          - "CPU: {{ (cpu_usage.stdout | from_json).CPU_Promedio }}%"
          - "Servicios activos: {{ running_services | length }}"
          - "Servicios detenidos auto: {{ stopped_services | length }}"
          - "Usuario: {{ (user_verification.stdout | from_json) }}"
          - "Reporte guardado en: {{ report_dir }}\\{{ report_file }}"